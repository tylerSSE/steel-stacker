<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#021530" />

    <title>Steel Stacker · Southern Steel Engineers</title>
    <meta
      name="description"
      content="Stack the steel. Ship the truck. A crane operator game from Southern Steel Engineers. Delegated steel design for fabricators, detailers, and erectors nationwide."
    />

    <!-- Favicons. Modern browsers pick the right size from the rel=icon list;
         Apple touch icon handles iOS home-screen pin behavior. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph: how the link renders when pasted into LinkedIn, Slack,
         iMessage, Discord, Facebook, etc. The 1200x630 image is critical —
         without it most platforms show nothing or a generic favicon thumb. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://steelstacker.com" />
    <meta property="og:title" content="Steel Stacker · Stack the Steel · Ship the Truck" />
    <meta
      property="og:description"
      content="A crane operator sim. Stack real AISC steel sections on the flatbed before the load shifts. Presented by Southern Steel Engineers."
    />
    <meta property="og:image" content="https://steelstacker.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X uses the large-summary card format, points at the same OG image. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Steel Stacker" />
    <meta
      name="twitter:description"
      content="Stack the steel. Ship the truck. A crane operator sim presented by Southern Steel Engineers."
    />
    <meta name="twitter:image" content="https://steelstacker.com/og-image.png" />

    <!-- Google Fonts. Preconnect hints fire before React mounts so the
         stylesheet request goes out as early as possible. font-display=swap
         means we show fallback fonts briefly until the real ones arrive. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Aleo:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
