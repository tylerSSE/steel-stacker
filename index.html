<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#021530" />

    <title>Steel Stacker · Southern Steel Engineers</title>
    <meta
      name="description"
      content="Stack the steel. Ship the truck. A crane operator game from Southern Steel Engineers. Delegated steel design for fabricators, detailers, and erectors nationwide."
    />

    <!-- Open Graph / social share -->
    <meta property="og:title" content="Steel Stacker" />
    <meta property="og:description" content="Stack the steel. Ship the truck." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts — preconnect hints fire before React mounts so the
         stylesheet request goes out as early as possible. font-display=swap
         means we show fallback fonts briefly until the real ones arrive. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Aleo:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
